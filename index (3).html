<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bling.is</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; cursor: none; }
    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      color: #fff; text-align: center; flex-direction: column; gap: 1rem;
    }
    #overlay h1 { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 600; }
    #overlay p { font-size: clamp(0.9rem, 2.5vw, 1.2rem); opacity: 0.6; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <div id="overlay" onclick="play()">
    <h1>Welcome to bling.is</h1>
    <p>Click to continue</p>
  </div>
  <iframe id="player" allow="autoplay; fullscreen" src="about:blank"></iframe>
  <script>
    let started = false;

    function play() {
      if (started) return;
      started = true;
      load();
      document.getElementById('overlay').style.display = 'none';
      lockThem();
    }

    function load() {
      // enablejsapi + origin so we can listen for the video ending and restart it
      document.getElementById('player').src =
        "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&modestbranding=1&rel=0&fs=0&disablekb=1&iv_load_policy=3&enablejsapi=1";
    }

    function lockThem() {
      // Loop forever: when the video ends, YT posts state 0 -> we reload it
      window.addEventListener('message', (e) => {
        if (typeof e.data === 'string' && e.data.indexOf('"playerState":0') !== -1) {
          load();
        }
      });
      // Fallback hard-loop in case the API message is missed
      setInterval(() => {
        if (started) {
          const f = document.getElementById('player');
          // poke play just in case they paused
          f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }
      }, 4000);

      // Trap the back button
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', () => {
        history.pushState(null, '', location.href);
        alert('Never gonna give you up');
      });

      // Warn on leave
      window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = '';
      });

      // Wiggle the tab title
      const titles = ['Never gonna give you up','Never gonna let you down','Never gonna run around','...and desert you'];
      let i = 0;
      setInterval(() => { document.title = titles[i++ % titles.length]; }, 800);
    }
  </script>
</body>
</html>
